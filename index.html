<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lixpo V5</title>

<style>
body {
  margin:0;
  background:#050505;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

/* Splash */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:999;
}

#logo {
  font-size:70px;
  color:red;
  font-weight:bold;
  animation:blink 0.7s infinite;
}

@keyframes blink {
  0%{opacity:1;}
  50%{opacity:0.1;}
  100%{opacity:1;}
}

/* App */
#app {
  display:none;
  height:100vh;
  flex-direction:column;
}

/* Topbar */
#topbar {
  background:#111;
  padding:10px;
  display:flex;
  gap:10px;
}

#url {
  flex:1;
  padding:10px;
  background:#1a1a1a;
  border:none;
  color:white;
  border-radius:10px;
}

button {
  background:red;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

/* Tabs */
#tabs {
  display:flex;
  background:#0d0d0d;
  padding:5px;
}

.tab {
  background:#1a1a1a;
  padding:8px 15px;
  margin-right:5px;
  border-radius:8px;
  cursor:pointer;
}

.tab.active {
  background:red;
}

/* Frame */
#frame {
  flex:1;
  border:none;
  width:100%;
}

/* Loader */
#loader {
  height:3px;
  width:0%;
  background:red;
  transition:0.3s;
}
</style>
</head>

<body>

<div id="splash">
  <div id="logo">LIXPO</div>
</div>

<div id="app">
  <div id="loader"></div>

  <div id="topbar">
    <input id="url" placeholder="URL gir...">
    <button onclick="go()">Git</button>
    <button onclick="newTab()">+ Tab</button>
  </div>

  <div id="tabs"></div>
  <iframe id="frame"></iframe>
</div>

<script>
let tabs = [];
let current = 0;

/* Splash */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="flex";
},2000);

/* Proxy encode (Ultraviolet / Rammerhead uyumlu mantık) */
function encodeURL(url){
  return "/service/" + btoa(url); 
}

/* URL düzelt */
function fix(url){
  if(!url.startsWith("http")){
    return "https://" + url;
  }
  return url;
}

function go(){
  let url = document.getElementById("url").value;
  url = fix(url);

  let proxied = encodeURL(url);

  loader.style.width="100%";
  setTimeout(()=>loader.style.width="0%",400);

  tabs[current].url = proxied;
  load(current);
}

function newTab(){
  tabs.push({url: encodeURL("https://example.com")});
  current = tabs.length-1;
  render();
  load(current);
}

function load(i){
  current = i;
  frame.src = tabs[i].url;
  url.value = atob(tabs[i].url.replace("/service/",""));
  render();
}

function render(){
  tabsDiv.innerHTML="";
  tabs.forEach((t,i)=>{
    let el = document.createElement("div");
    el.className="tab"+(i===current?" active":"");
    el.innerText="Tab "+(i+1);
    el.onclick=()=>load(i);
    tabsDiv.appendChild(el);
  });
}

/* init */
const tabsDiv = document.getElementById("tabs");
const frame = document.getElementById("frame");
const loader = document.getElementById("loader");
const url = document.getElementById("url");
const splash = document.getElementById("splash");
const app = document.getElementById("app");

newTab();
</script>

</body>
</html>
